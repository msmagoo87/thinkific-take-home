name: Build image

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io # Only used for labeling, if you want to push it make sure you have permissions to push.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd550202970632900a06806655c65917812 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@de3086733221437194f780e0c83a73642323e742 # v3

      - name: Log in to the Container registry
        uses: docker/login-action@c144859d9c2872323238883655169a8385628562 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e4032d165686000760460391d19129524021 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long

      - name: Build Docker image for scan
        uses: docker/build-push-action@de3086733221437194f780e0c83a73642323e742 # v7
        with:
          context: .
          load: true # This loads the image into the local Docker daemon instead of pushing it
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f251a8b652ca9533f746244a0401d364402b65 # v0.29.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@430588667634f1b2c4e6221c97f4805e192f1530 # v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@de3086733221437194f780e0c83a73642323e742 #v7
        with:
          context: .
          # Allows us to test the image build succeeds for the PR but doesn't 
          # end up in the registry until merged to main
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa2b9474c10a40a2f4a5f4a19122a5624021 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true