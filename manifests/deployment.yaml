apiVersion: apps/v1
kind: Deployment
metadata:
  name: dumbkv
  labels:
    app: dumbkv
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dumbkv
  template:
    metadata:
      labels:
        app: dumbkv
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001 
      
      containers:
      - name: dumbkv
        image: ghcr.io/msmagoo87/thinkific-take-home:main
        
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_TYPE
          value: "postgres"
        - name: DATABASE_LOCATION
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: connection-string

        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5

        volumeMounts:
        - name: tmp-dir
          mountPath: /tmp

      volumes:
      - name: tmp-dir
        emptyDir: {}